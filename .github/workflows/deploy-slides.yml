name: Deploy Marp Slides to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'report/EDA_SLIDES.md'
      - 'images/**'

permissions:
  contents: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Generate HTML Slides
        run: |
          marp report/EDA_SLIDES.md -o docs/index.html --html

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Auto-deploy slides from report/EDA_SLIDES.md [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Update Issue Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = 1;
            const repo = context.repo;
            const body = `🚀 **슬라이드가 자동으로 업데이트되었습니다!**\n\n최신 버전 확인: [https://aboya342-gif.github.io/wiset-inflearn-nemo-/docs/index.html#1](https://aboya342-gif.github.io/wiset-inflearn-nemo-/docs/index.html#1)\n(커밋: ${context.sha})`;
            
            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue_number,
              body: body
            });
